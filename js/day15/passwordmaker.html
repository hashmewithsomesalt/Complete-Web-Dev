<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Maker</title>
    <link rel="stylesheet" href="passwordmaker.css">
</head>

<body>
    <h1>Password Maker</h1>
    <div class="password-container">
        <div class="password-box" id="password1"></div>
        <button onclick="copyPassword('password1')">📋 Copy</button>
    </div>

    <div class="password-container">
        <div class="password-box" id="password2"></div>
        <button onclick="copyPassword('password2')">📋 Copy</button>
    </div>

    <div class="input-group">
        <label for="length">Password Length: </label>
        <input type="number" min="8" max="30" placeholder="Enter Password Length" id="length">
    </div>
    <button onclick="generatePass()">Click to Generate Password</button>
    <script src="passwordmaker.js"></script>
</body>
</body>

</html>
