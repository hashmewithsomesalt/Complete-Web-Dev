<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BasketBall ScoreBoard</title>
    <link rel="stylesheet" href="basketball.css">
</head>
<body>
    <div id="main-container">
        <div id="team1">
            <h2>Team A</h2>
            <div id="scoreA" class="score">0</div>
            <button onclick="plusone()" class="button">+1</button>
            <button onclick="plustwo()" class="button">+2</button>
            <button onclick="plusthree()" class="button">+3</button>

        </div>
        <div id="team2">
            <h2>Team B</h2>  
            <div id="scoreB" class="score">0</div>
            <button onclick="plusone1()" class="button">+1</button>
            <button onclick="plustwo2()" class="button">+2</button>
            <button onclick="plusthree3()" class="button">+3</button>     
        </div>
    </div>

    <div id="reset-container">
        <button id="reset" onclick="resetbtn()">RESET</button>
    </div>

    <script src="basketball.js"></script>
</body>
</html>
