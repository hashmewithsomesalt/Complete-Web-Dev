<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="soloproject3.css">
</head>
<body>
    <div id="header">
        <h1>Metric/ Impreial Unit Conversion </h1>
        <input type="number" placeholder="enter number">
        <div id="container-el"></div>
        <button id="btn-el">Convert</button>
    </div>

    <div id="main">
        <div class="convert-show">
            <h2>Length (Meter/ Feet) </h2>
            <div class="design-el" id="length-el"></div>
        </div>
        <div class="convert-show">
            <h2>Mass (Kilogram/ Pounds) </h2>
            <div class="design-el" id="mass-el"></div>
        </div>
        <div class="convert-show">
            <h2>Volume (Liter/ Gallons) </h2>
            <div class="design-el" id="volume-el"></div>
        </div>
        <script src="soloproject3.js"></script>

    </div>
</body>
</html>
